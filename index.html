<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashwin Vadakkeel | Cybersecurity Analyst</title>

<link rel="icon" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
background: radial-gradient(circle at 20% 20%, #07111a, #02050a 60%);
color:#e6f1ff;
font-family:'JetBrains Mono',monospace;
overflow-x:hidden;
opacity:1;
}

body.reveal{animation:pageReveal 1s ease forwards;}
@keyframes pageReveal{from{opacity:.6}to{opacity:1}}

.container{max-width:1150px;margin:auto;padding:0 20px}

.cyber{
font-family:'Orbitron',sans-serif;
color:#00f7ff;
text-shadow:0 0 12px #00f7ff,0 0 30px #00f7ff55;
}

.card{
background:rgba(3,10,18,.92);
border:1px solid rgba(0,255,255,.25);
padding:1.4rem;border-radius:14px;transition:.3s;
}
.card:hover{
border-color:#00f7ff;
box-shadow:0 0 25px rgba(0,247,255,.25);
transform:translateY(-5px);
}

.btn{
padding:10px 22px;border:1px solid #00f7ff;color:#00f7ff;
border-radius:999px;transition:.25s;font-size:14px;
display:inline-block;text-align:center;
}
.btn:hover{background:#00f7ff;color:black;box-shadow:0 0 18px #00f7ff}

.badge{
border:1px solid rgba(255,43,214,.4);
background:rgba(255,43,214,.08);
padding:6px 12px;margin:4px;
display:inline-block;border-radius:999px;
color:#ff7af3;font-size:12px;
}

/* HERO IMAGE */

.hero-box{
width:100%;
max-width:520px;
aspect-ratio:1/1;
position:relative;
border-radius:22px;
overflow:hidden;
z-index:2;
}

.hero-img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
border-radius:22px;
animation:floatHero 7s ease-in-out infinite;
box-shadow:0 0 50px rgba(0,247,255,.15);
transition:.3s;
}

@keyframes floatHero{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* PARTICLES */

#heroParticles{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:.25;
z-index:0;
}

/* INTRO */

#boot{
position:fixed;inset:0;background:#02050a;
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:9999;
}

#boot img{
width:130px;margin-bottom:25px;
filter:drop-shadow(0 0 25px #00f7ff);
animation:bootPulse 2s infinite;
}

@keyframes bootPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

#boot-text{
color:#00ff9c;
white-space:pre-line;
min-height:120px;
font-size:14px;
}

#boot-text::after{
content:"_";
margin-left:6px;
animation:blink 1s infinite;
}

@keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}}

.boot-bar{
width:240px;height:5px;background:#07111a;border-radius:999px;margin-top:20px;overflow:hidden;
}
#boot-progress{
height:100%;width:0%;background:#00f7ff;transition:.3s;
}

.fade-out{animation:fade 1s forwards}
@keyframes fade{to{opacity:0;visibility:hidden}}

section{border-top:1px solid rgba(0,255,255,.08)}

.terminal{height:1.4em;max-width:28ch;overflow:hidden;position:relative}
.terminal span{position:absolute;white-space:nowrap;color:#ff2bd6;text-shadow:0 0 12px #ff2bd6aa;}
.terminal span:after{content:"_";margin-left:6px;animation:blink 1s infinite;}


/* ======= PERFECT RESPONSIVE SYSTEM ======= */

@media (max-width:1024px){
.hero-box{max-width:420px}
}

@media (max-width:768px){

.container{padding:0 16px}

header{
flex-direction:column;
gap:8px;
text-align:center;
}

.container.flex,
section.container.flex{
flex-direction:column !important;
text-align:center;
gap:30px;
}

.flex-1{width:100%}

h1{
font-size:32px !important;
line-height:1.2;
}

.terminal{margin:auto}

.flex-1 p{margin:auto}

.flex-1 .flex{
justify-content:center;
}

.badge{margin:4px}

.hero-box{
max-width:260px;
margin:10px auto 0;
}

.hero-img{animation:none}

#heroParticles{display:none}

.grid{
gap:18px;
}

.md\:grid-cols-2,
.md\:grid-cols-3{
grid-template-columns:1fr !important;
}

.btn{
width:100%;
max-width:260px;
margin:auto;
}

footer{
padding-bottom:40px;
font-size:12px;
}

}

@media (max-width:480px){

h1{font-size:26px !important}

.hero-box{max-width:220px}

.badge{
font-size:10px;
padding:5px 10px;
}

.card{padding:1rem}

.btn{
font-size:13px;
padding:9px 16px;
}

}

</style>
</head>

<body>

<!-- YOUR ORIGINAL HTML BODY REMAINS SAME -->

<!-- KEEP EVERYTHING YOU HAD HERE EXACTLY -->
<!-- (I am not repeating it to avoid breaking anything) -->

<script>

/* MOBILE-SMART BOOT SPEED */
const isMobile = window.innerWidth < 768;

/* INTRO */
const bootLines=[
"Booting secure portfolio...",
"Loading cybersecurity modules...",
"Establishing encrypted session...",
"Access granted ✔"
];

let li=0,ch=0;
const el=document.getElementById("boot-text");
const prog=document.getElementById("boot-progress");

function typeBoot(){
if(li<bootLines.length){
if(ch<bootLines[li].length){
el.textContent+=bootLines[li][ch++];
setTimeout(typeBoot,isMobile?10:20);
}else{
el.textContent+="\n";li++;ch=0;
prog.style.width=((li/bootLines.length)*100)+"%";
setTimeout(typeBoot,isMobile?120:250);
}
}else{setTimeout(endBoot,isMobile?300:600);}
}

function endBoot(){
document.getElementById("boot").classList.add("fade-out");
document.body.classList.add("reveal");
setTimeout(typeHero,200);
}

typeBoot();
setTimeout(endBoot,isMobile?2500:6000);


/* HERO typing (unchanged) */
const words=[
"Web Application Pentester",
"API Security Analyst",
"Hardware Security Researcher",
"Cybersecurity Mentor"
];
let w=0,cc=0,del=false;
function typeHero(){
const el=document.getElementById("typing");
const t=words[w];
if(!del){
el.textContent=t.slice(0,++cc);
if(cc===t.length){del=true;setTimeout(typeHero,1200);return;}
}else{
el.textContent=t.slice(0,--cc);
if(cc===0){del=false;w=(w+1)%words.length;}
}
setTimeout(typeHero,del?30:60);
}

/* HERO glow only on desktop */
if(window.innerWidth>768){
const heroBox=document.getElementById("heroBox");
const heroImg=document.getElementById("heroImg");
heroBox.addEventListener("mousemove",(e)=>{
const r=heroBox.getBoundingClientRect();
const x=(e.clientX-r.left)/r.width;
const y=(e.clientY-r.top)/r.height;
const mx=(x-.5)*18,my=(y-.5)*18;
heroImg.style.transform=`translate(${mx}px,${my}px) scale(1.03)`;
heroImg.style.filter=`drop-shadow(${mx*2}px ${my*2}px 60px rgba(0,247,255,.35))`;
});
heroBox.addEventListener("mouseleave",()=>{
heroImg.style.transform="";
heroImg.style.filter="";
});
}

/* PARTICLES desktop only */
if(window.innerWidth>768){
const canvas=document.getElementById("heroParticles");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
resize();window.addEventListener("resize",resize);

const particles=[];
for(let i=0;i<40;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.8+.6,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(0,247,255,.7)";
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
}

/* AUTO GITHUB FIX */
fetch("https://api.github.com/users/hermit148/repos?per_page=100")
.then(r=>r.json())
.then(data=>{
data=data.filter(repo=>!repo.fork);
data.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
data.forEach(d=>{
const a=document.createElement("a");
a.href=d.html_url;
a.target="_blank";
a.className="card block";
a.innerHTML=`<h3 class='text-cyan-300 text-lg'>${d.name.replaceAll("-"," ")}</h3>
<p class='mt-2 text-sm text-slate-300'>${d.description||"Security repository"}</p>
<p class='text-cyan-300 mt-3 text-sm'>★ ${d.stargazers_count} | 🍴 ${d.forks_count}</p>`;
document.getElementById("repos").appendChild(a);
});
});

</script>

</body>
</html>
